<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Alma · Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
  :root{
    --bg:#1A1A2E;--surface:#F5EDD6;--surface2:#EDE0C4;
    --mint:#7EC8C8;--mint-dark:#5AABAB;--cafe:#C47C3E;--cafe-dark:#A5632A;
    --text-dark:#1A1A2E;--text-mid:#4A4A5A;--text-light:#8A8A9A;
    --ok:#4CAF7D;--warn:#E8A838;--red:#D45050;
  }
  body{background:var(--bg);font-family:'Inter',sans-serif;min-height:100vh;padding-bottom:60px;}

  /* HEADER */
  .site-header{background:var(--bg);text-align:center;padding:24px 24px 16px;border-bottom:1px solid rgba(126,200,200,0.15);position:sticky;top:0;z-index:100;}
  .brand-name{font-family:'Playfair Display',serif;font-size:1.6rem;color:var(--surface);letter-spacing:0.04em;}
  .brand-sub{font-size:0.65rem;color:var(--mint);letter-spacing:0.22em;text-transform:uppercase;margin-top:3px;font-weight:500;}
  .sync-bar{font-size:0.7rem;margin-top:6px;letter-spacing:0.06em;color:#4A4A5A;}

  /* FILTRO TEMPORAL */
  .filtro-bar{
    background:rgba(255,255,255,0.04);
    border-bottom:1px solid rgba(126,200,200,0.1);
    padding:12px 16px;
    display:flex;
    gap:8px;
    flex-wrap:wrap;
    align-items:center;
    justify-content:center;
  }
  .filtro-btn{
    padding:6px 14px;
    border:1.5px solid rgba(126,200,200,0.25);
    border-radius:20px;
    background:transparent;
    color:rgba(245,237,214,0.6);
    font-family:'Inter',sans-serif;
    font-size:0.72rem;
    font-weight:600;
    cursor:pointer;
    transition:all 0.2s;
    white-space:nowrap;
  }
  .filtro-btn:hover{border-color:var(--mint);color:var(--mint);}
  .filtro-btn.active{background:var(--mint);border-color:var(--mint);color:var(--text-dark);}

  .filtro-custom{
    display:none;
    gap:8px;
    align-items:center;
    flex-wrap:wrap;
    justify-content:center;
    padding:8px 16px;
    background:rgba(255,255,255,0.03);
    border-bottom:1px solid rgba(126,200,200,0.1);
  }
  .filtro-custom.visible{display:flex;}
  .filtro-custom label{font-size:0.7rem;color:rgba(245,237,214,0.6);font-weight:600;letter-spacing:0.08em;text-transform:uppercase;}
  .filtro-custom input[type=date]{
    padding:6px 10px;
    background:rgba(255,255,255,0.08);
    border:1.5px solid rgba(126,200,200,0.2);
    border-radius:8px;
    color:var(--surface);
    font-family:'Inter',sans-serif;
    font-size:0.8rem;
    cursor:pointer;
  }
  .filtro-custom input[type=date]:focus{outline:none;border-color:var(--mint);}
  .btn-aplicar{
    padding:6px 16px;
    background:var(--mint);
    color:var(--text-dark);
    border:none;
    border-radius:8px;
    font-family:'Inter',sans-serif;
    font-size:0.78rem;
    font-weight:600;
    cursor:pointer;
  }
  .periodo-label{
    text-align:center;
    font-size:0.72rem;
    color:rgba(245,237,214,0.45);
    padding:6px;
    letter-spacing:0.06em;
  }

  /* CONTENT */
  .content{max-width:960px;margin:0 auto;padding:20px 16px;}

  /* KPI CARDS */
  .kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:24px;}
  @media(max-width:700px){.kpi-grid{grid-template-columns:repeat(2,1fr);}}
  .kpi-card{
    background:var(--surface);
    border-radius:14px;
    padding:18px 16px;
    box-shadow:0 4px 20px rgba(0,0,0,0.3);
  }
  .kpi-label{font-size:0.62rem;font-weight:600;letter-spacing:0.14em;text-transform:uppercase;color:var(--text-light);margin-bottom:8px;}
  .kpi-value{font-family:'Playfair Display',serif;font-size:2rem;color:var(--text-dark);line-height:1;}
  .kpi-sub{font-size:0.7rem;color:var(--text-light);margin-top:4px;}
  .kpi-ok   .kpi-value{color:#2E7D52;}
  .kpi-warn .kpi-value{color:#9A6A10;}
  .kpi-red  .kpi-value{color:#9A2020;}
  .kpi-mint .kpi-value{color:var(--mint-dark);}

  /* SECTION */
  .section-title{
    font-family:'Playfair Display',serif;
    font-size:1rem;
    color:var(--surface);
    margin-bottom:14px;
    padding-bottom:8px;
    border-bottom:1px solid rgba(126,200,200,0.15);
    display:flex;
    align-items:center;
    gap:8px;
  }
  .section-title span{
    font-family:'Inter',sans-serif;
    font-size:0.62rem;
    letter-spacing:0.16em;
    text-transform:uppercase;
    color:var(--mint);
    font-weight:600;
  }

  /* TABLES */
  .table-card{
    background:var(--surface);
    border-radius:14px;
    padding:20px;
    box-shadow:0 4px 20px rgba(0,0,0,0.3);
    margin-bottom:20px;
    overflow-x:auto;
  }
  .table-card .card-title{
    font-family:'Playfair Display',serif;
    font-size:0.95rem;
    color:var(--text-dark);
    margin-bottom:14px;
    padding-bottom:10px;
    border-bottom:1.5px solid var(--surface2);
  }
  .table-card .card-title span{
    display:block;
    font-family:'Inter',sans-serif;
    font-size:0.6rem;
    letter-spacing:0.16em;
    text-transform:uppercase;
    color:var(--cafe);
    font-weight:600;
    margin-bottom:2px;
  }
  table{width:100%;border-collapse:collapse;font-size:0.82rem;}
  th{text-align:left;padding:8px 10px;font-size:0.65rem;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;color:var(--text-light);border-bottom:1.5px solid var(--surface2);}
  td{padding:9px 10px;border-bottom:1px solid var(--surface2);color:var(--text-dark);}
  tr:last-child td{border-bottom:none;}
  tr:hover td{background:rgba(126,200,200,0.05);}

  /* BADGES */
  .badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:0.65rem;font-weight:600;}
  .badge-ok     {background:rgba(76,175,125,0.12);color:#2E7D52;}
  .badge-warn   {background:rgba(232,168,56,0.15);color:#9A6A10;}
  .badge-red    {background:rgba(212,80,80,0.12);color:#9A2020;}
  .badge-mint   {background:rgba(126,200,200,0.15);color:var(--mint-dark);}
  .badge-cafe   {background:rgba(196,124,62,0.12);color:#7A4515;}

  /* STOCK ITEMS */
  .stock-item{
    display:flex;align-items:center;gap:10px;
    padding:10px 12px;border-radius:8px;
    background:#fff;border:1.5px solid var(--surface2);
    margin-bottom:8px;
  }
  .stock-item-info{flex:1;min-width:0;}
  .stock-item-nombre{font-size:0.87rem;font-weight:600;color:var(--text-dark);}
  .stock-item-meta{font-size:0.7rem;color:var(--text-light);margin-top:2px;}
  .stock-venc-ok    {border-left:3px solid #4CAF7D;}
  .stock-venc-warn  {border-left:3px solid var(--warn);}
  .stock-venc-hoy   {border-left:3px solid var(--red);background:rgba(212,80,80,0.03);}
  .stock-venc-vencido{border-left:3px solid #9A2020;background:rgba(212,80,80,0.06);}

  /* BAR CHART */
  .bar-row{display:flex;align-items:center;gap:10px;margin-bottom:8px;}
  .bar-label{width:130px;font-size:0.75rem;color:var(--text-dark);font-weight:500;text-align:right;flex-shrink:0;}
  .bar-track{flex:1;height:18px;background:var(--surface2);border-radius:9px;overflow:hidden;}
  .bar-fill{height:100%;border-radius:9px;background:var(--mint);transition:width 0.6s ease;}
  .bar-fill-cafe{background:var(--cafe);}
  .bar-fill-red{background:var(--red);}
  .bar-val{width:50px;font-size:0.75rem;font-weight:600;color:var(--text-dark);}

  /* ACTIVIDAD */
  .act-item{display:flex;align-items:flex-start;gap:10px;padding:9px 0;border-bottom:1px solid var(--surface2);}
  .act-item:last-child{border-bottom:none;}
  .act-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;margin-top:5px;}
  .act-dot-login   {background:var(--mint);}
  .act-dot-ingreso {background:var(--ok);}
  .act-dot-apertura{background:var(--cafe);}
  .act-dot-cierre  {background:var(--red);}
  .act-info{flex:1;min-width:0;}
  .act-desc{font-size:0.82rem;font-weight:500;color:var(--text-dark);}
  .act-meta{font-size:0.7rem;color:var(--text-light);margin-top:2px;}

  .empty-state{text-align:center;padding:32px;font-size:0.82rem;color:var(--text-light);}

  .two-col-dash{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:20px;}
  @media(max-width:680px){.two-col-dash{grid-template-columns:1fr;}}

  .loading{text-align:center;padding:40px;color:rgba(245,237,214,0.4);font-size:0.85rem;}
</style>
</head>
<body>

<header class="site-header">
  <div class="brand-name">Alma</div>
  <div class="brand-sub">Gelato &amp; Café · Dashboard</div>
  <div class="sync-bar" id="syncBar">⟳ Cargando datos…</div>
</header>

<!-- FILTRO TEMPORAL -->
<div class="filtro-bar">
  <button class="filtro-btn active" onclick="setFiltro('hoy',this)">Hoy</button>
  <button class="filtro-btn" onclick="setFiltro('7dias',this)">7 días</button>
  <button class="filtro-btn" onclick="setFiltro('30dias',this)">30 días</button>
  <button class="filtro-btn" onclick="setFiltro('semana',this)">Semana actual</button>
  <button class="filtro-btn" onclick="setFiltro('mes',this)">Mes actual</button>
  <button class="filtro-btn" onclick="setFiltro('año',this)">Año actual</button>
  <button class="filtro-btn" onclick="setFiltro('custom',this)">Personalizado</button>
</div>
<div class="filtro-custom" id="filtroCustom">
  <label>Desde</label>
  <input type="date" id="fechaDesde">
  <label>Hasta</label>
  <input type="date" id="fechaHasta">
  <button class="btn-aplicar" onclick="aplicarCustom()">Aplicar</button>
</div>
<div class="periodo-label" id="periodoLabel">—</div>

<div class="content" id="mainContent">
  <div class="loading">⟳ Cargando datos desde Sheets…</div>
</div>

<script>
const API_URL = 'https://script.google.com/macros/s/AKfycbxRjWGpE1U87LYO8G6WpDmcPwzSp5mSiQP2FugED1XqTUHMlewTNTwSjLtRic6eAGp1HQ/exec';

// ── ESTADO ────────────────────────────────────────────────────
let allData = { ingresos:[], cierres:[], aperturas:[], actividad:[], catalogo:null };
let filtroActivo = 'hoy';
let fechaDesde = null;
let fechaHasta = null;

// ── API ───────────────────────────────────────────────────────
async function apiGet(accion){
  const r = await fetch(`${API_URL}?accion=${accion}`);
  return r.json();
}
async function apiGetData(accion, data){
  const params = `?accion=${accion}&data=${encodeURIComponent(JSON.stringify(data))}`;
  const r = await fetch(API_URL + params);
  return r.json();
}

// ── CARGAR DATOS ──────────────────────────────────────────────
async function cargarTodo(){
  document.getElementById('syncBar').textContent = '⟳ Cargando datos…';
  try {
    const [rCat, rStock, rAct] = await Promise.all([
      apiGet('getCatalogo'),
      apiGet('getStock'),
      apiGet('getActividad')
    ]);
    const [rCierres, rAperturas] = await Promise.all([
      apiGet('getCierres'),
      apiGet('getAperturas')
    ]);

    if(rCat.ok)      allData.catalogo   = rCat.data;
    if(rStock.ok)    allData.ingresos   = rStock.data || [];
    if(rAct.ok)      allData.actividad  = rAct.data  || [];
    if(rCierres.ok)  allData.cierres    = rCierres.data  || [];
    if(rAperturas.ok)allData.aperturas  = rAperturas.data || [];

    document.getElementById('syncBar').textContent = `☁ Actualizado ${new Date().toLocaleTimeString('es-AR',{hour:'2-digit',minute:'2-digit'})}`;
    document.getElementById('syncBar').style.color = '#2E7D52';
  } catch(e){
    document.getElementById('syncBar').textContent = '⚠ Error al cargar datos';
    document.getElementById('syncBar').style.color = '#9A2020';
  }
  renderDashboard();
}

// ── FILTRO TEMPORAL ───────────────────────────────────────────
function setFiltro(tipo, btn){
  filtroActivo = tipo;
  document.querySelectorAll('.filtro-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  const custom = document.getElementById('filtroCustom');
  custom.classList.toggle('visible', tipo === 'custom');
  if(tipo !== 'custom') renderDashboard();
}

function aplicarCustom(){
  fechaDesde = document.getElementById('fechaDesde').value;
  fechaHasta = document.getElementById('fechaHasta').value;
  if(!fechaDesde || !fechaHasta){ alert('Seleccioná ambas fechas.'); return; }
  renderDashboard();
}

function getRango(){
  const hoy = new Date();
  hoy.setHours(23,59,59,999);
  let desde = new Date();
  desde.setHours(0,0,0,0);

  switch(filtroActivo){
    case 'hoy':
      break;
    case '7dias':
      desde = new Date(hoy); desde.setDate(hoy.getDate()-6); desde.setHours(0,0,0,0);
      break;
    case '30dias':
      desde = new Date(hoy); desde.setDate(hoy.getDate()-29); desde.setHours(0,0,0,0);
      break;
    case 'semana':
      desde = new Date(hoy);
      const dia = desde.getDay();
      const diff = dia === 0 ? 6 : dia - 1; // lunes
      desde.setDate(desde.getDate() - diff);
      desde.setHours(0,0,0,0);
      break;
    case 'mes':
      desde = new Date(hoy.getFullYear(), hoy.getMonth(), 1);
      break;
    case 'año':
      desde = new Date(hoy.getFullYear(), 0, 1);
      break;
    case 'custom':
      if(fechaDesde && fechaHasta){
        desde = new Date(fechaDesde + 'T00:00:00');
        const hasta = new Date(fechaHasta + 'T23:59:59');
        return { desde, hasta };
      }
      break;
  }
  return { desde, hasta: hoy };
}

function enRango(tsStr, rango){
  if(!tsStr) return false;
  const ts = new Date(tsStr);
  return ts >= rango.desde && ts <= rango.hasta;
}

function formatRango(rango){
  const opts = { day:'numeric', month:'short', year:'numeric' };
  const d = rango.desde.toLocaleDateString('es-AR', opts);
  const h = rango.hasta.toLocaleDateString('es-AR', opts);
  if(d === h) return d;
  return `${d} — ${h}`;
}

// ── RENDER PRINCIPAL ──────────────────────────────────────────
function renderDashboard(){
  const rango = getRango();
  document.getElementById('periodoLabel').textContent = formatRango(rango);

  // Filtrar por rango
  const ingresos  = allData.ingresos.filter(r => enRango(r.timestamp, rango));
  const cierres   = allData.cierres.filter(r  => enRango(r.timestamp, rango));
  const aperturas = allData.aperturas.filter(r => enRango(r.timestamp, rango));
  const actividad = allData.actividad.filter(r => enRango(r.timestamp, rango));

  // Stock actual (siempre sin filtro de tiempo — es estado actual)
  const stockActual = allData.ingresos.filter(r =>
    r.retirado === false || r.retirado === 'false' || r.retirado === '' || r.retirado === 0
  );

  // KPIs
  const totalIngresos   = ingresos.length;
  const totalRetirados  = cierres.filter(r => r.retirado === true || r.retirado === 'true').length;
  const enExhibicion    = stockActual.length;
  const discrepancias   = aperturas.filter(r => Number(r.diferencia) !== 0).length;

  // Próximos a vencer (stock actual)
  const now = new Date();
  const proximosVencer = stockActual.filter(r => {
    if(!r.fechaVenc) return false;
    const venc = new Date(r.fechaVenc);
    const diff = Math.ceil((venc - now) / 86400000);
    return diff <= 2 && diff >= 0;
  }).length;

  const html = `
    <!-- KPIs -->
    <div class="kpi-grid">
      <div class="kpi-card kpi-mint">
        <div class="kpi-label">En exhibición</div>
        <div class="kpi-value">${enExhibicion}</div>
        <div class="kpi-sub">productos activos</div>
      </div>
      <div class="kpi-card ${totalRetirados > 0 ? 'kpi-red' : 'kpi-ok'}">
        <div class="kpi-label">Pérdidas</div>
        <div class="kpi-value">${totalRetirados}</div>
        <div class="kpi-sub">retirados por vencimiento</div>
      </div>
      <div class="kpi-card ${proximosVencer > 0 ? 'kpi-warn' : 'kpi-ok'}">
        <div class="kpi-label">Vencen pronto</div>
        <div class="kpi-value">${proximosVencer}</div>
        <div class="kpi-sub">en las próximas 48hs</div>
      </div>
      <div class="kpi-card ${discrepancias > 0 ? 'kpi-warn' : 'kpi-ok'}">
        <div class="kpi-label">Discrepancias</div>
        <div class="kpi-value">${discrepancias}</div>
        <div class="kpi-sub">en aperturas del período</div>
      </div>
    </div>

    <!-- Stock actual + Ingresos por categoría -->
    <div class="two-col-dash">
      ${renderStockActual(stockActual)}
      ${renderIngresosPorCategoria(ingresos)}
    </div>

    <!-- Pérdidas por producto -->
    ${renderPerdidasPorProducto(cierres)}

    <!-- Actividad de operadores -->
    ${renderActividad(actividad)}

    <!-- Discrepancias en aperturas -->
    ${renderDiscrepancias(aperturas)}
  `;

  document.getElementById('mainContent').innerHTML = html;
}

// ── STOCK ACTUAL ──────────────────────────────────────────────
function renderStockActual(stock){
  const now = new Date();
  const items = stock.map(r => {
    const venc = r.fechaVenc ? new Date(r.fechaVenc) : null;
    const diff = venc ? Math.ceil((venc - now) / 86400000) : null;
    let cls = 'stock-venc-ok', badge = '', badgeCls = 'badge-ok', badgeTxt = 'En fecha';
    if(diff !== null){
      if(diff < 0)    { cls='stock-venc-vencido'; badgeCls='badge-red';  badgeTxt='Vencido'; }
      else if(diff===0){ cls='stock-venc-hoy';    badgeCls='badge-red';  badgeTxt='Vence hoy'; }
      else if(diff<=2) { cls='stock-venc-warn';   badgeCls='badge-warn'; badgeTxt=`${diff}d`; }
    }
    const cant = r.divisible
      ? `${r.stockPorciones||0} porc.`
      : `${r.stockUnidades||0} ud.`;
    const sabor = r.sabor && r.sabor !== '—' ? ` · ${r.sabor}` : '';
    return `
    <div class="stock-item ${cls}">
      <div class="stock-item-info">
        <div class="stock-item-nombre">${r.productoNombre}${sabor}</div>
        <div class="stock-item-meta">${r.categoriaNombre||'—'} · ${cant} · Vence: ${r.fechaVencDisplay||'—'}</div>
      </div>
      <span class="badge ${badgeCls}">${badgeTxt}</span>
    </div>`;
  }).join('') || '<div class="empty-state">Sin productos en exhibición.</div>';

  return `
  <div class="table-card">
    <div class="card-title"><span>Estado actual</span>Stock en exhibidor</div>
    ${items}
  </div>`;
}

// ── INGRESOS POR CATEGORÍA ────────────────────────────────────
function renderIngresosPorCategoria(ingresos){
  const cats = {};
  ingresos.forEach(r => {
    const c = r.categoriaNombre || 'Sin categoría';
    cats[c] = (cats[c] || 0) + 1;
  });
  const sorted = Object.entries(cats).sort((a,b) => b[1]-a[1]);
  const max = sorted[0]?.[1] || 1;

  const bars = sorted.map(([cat, cnt]) => `
    <div class="bar-row">
      <div class="bar-label">${cat}</div>
      <div class="bar-track"><div class="bar-fill" style="width:${Math.round(cnt/max*100)}%"></div></div>
      <div class="bar-val">${cnt}</div>
    </div>`).join('') || '<div class="empty-state">Sin ingresos en el período.</div>';

  return `
  <div class="table-card">
    <div class="card-title"><span>Período seleccionado</span>Ingresos por categoría</div>
    ${bars}
  </div>`;
}

// ── PÉRDIDAS POR PRODUCTO ─────────────────────────────────────
function renderPerdidasPorProducto(cierres){
  const perdidas = cierres.filter(r => r.retirado === true || r.retirado === 'true');
  if(!perdidas.length) return `
  <div class="table-card">
    <div class="card-title"><span>Período seleccionado</span>Pérdidas por vencimiento</div>
    <div class="empty-state">Sin pérdidas en el período. ✓</div>
  </div>`;

  const prods = {};
  perdidas.forEach(r => {
    const key = `${r.productoNombre}${r.sabor&&r.sabor!=='—'?' – '+r.sabor:''}`;
    if(!prods[key]) prods[key] = { nombre:key, cat:r.categoriaNombre, cant:0, motivo:r.motivoRetiro };
    prods[key].cant++;
  });

  const rows = Object.values(prods).sort((a,b)=>b.cant-a.cant).map(p=>`
    <tr>
      <td>${p.nombre}</td>
      <td>${p.cat||'—'}</td>
      <td><strong>${p.cant}</strong></td>
      <td><span class="badge badge-red">${p.motivo||'vencimiento'}</span></td>
    </tr>`).join('');

  return `
  <div class="table-card">
    <div class="card-title"><span>Período seleccionado</span>Pérdidas por vencimiento</div>
    <table>
      <thead><tr><th>Producto</th><th>Categoría</th><th>Veces retirado</th><th>Motivo</th></tr></thead>
      <tbody>${rows}</tbody>
    </table>
  </div>`;
}

// ── ACTIVIDAD DE OPERADORES ───────────────────────────────────
function renderActividad(actividad){
  if(!actividad.length) return `
  <div class="table-card">
    <div class="card-title"><span>Período seleccionado</span>Actividad de operadores</div>
    <div class="empty-state">Sin actividad registrada en el período.</div>
  </div>`;

  // Resumen por operador
  const ops = {};
  actividad.forEach(a => {
    if(!ops[a.operador]) ops[a.operador] = { nombre:a.operador, logins:0, ingresos:0, aperturas:0, cierres:0 };
    if(a.accion==='login')    ops[a.operador].logins++;
    if(a.accion==='ingreso')  ops[a.operador].ingresos++;
    if(a.accion==='apertura') ops[a.operador].aperturas++;
    if(a.accion==='cierre')   ops[a.operador].cierres++;
  });

  const rows = Object.values(ops).map(o=>`
    <tr>
      <td><strong>${o.nombre}</strong></td>
      <td>${o.logins}</td>
      <td>${o.ingresos}</td>
      <td>${o.aperturas}</td>
      <td>${o.cierres}</td>
    </tr>`).join('');

  // Últimas 10 acciones
  const ultimas = [...actividad].reverse().slice(0,10).map(a=>{
    const colores = { login:'act-dot-login', ingreso:'act-dot-ingreso', apertura:'act-dot-apertura', cierre:'act-dot-cierre' };
    return `
    <div class="act-item">
      <div class="act-dot ${colores[a.accion]||'act-dot-login'}"></div>
      <div class="act-info">
        <div class="act-desc">${a.operador} — ${a.accion} <span style="font-weight:400;color:var(--text-light)">${a.detalle||''}</span></div>
        <div class="act-meta">${a.fecha||'—'} · ${a.hora||'—'} · Turno ${a.turno||'—'}</div>
      </div>
    </div>`;
  }).join('');

  return `
  <div class="two-col-dash">
    <div class="table-card">
      <div class="card-title"><span>Período seleccionado</span>Resumen por operador</div>
      <table>
        <thead><tr><th>Operador</th><th>Logins</th><th>Ingresos</th><th>Aperturas</th><th>Cierres</th></tr></thead>
        <tbody>${rows}</tbody>
      </table>
    </div>
    <div class="table-card">
      <div class="card-title"><span>Más recientes</span>Últimas acciones</div>
      ${ultimas}
    </div>
  </div>`;
}

// ── DISCREPANCIAS EN APERTURAS ────────────────────────────────
function renderDiscrepancias(aperturas){
  const diffs = aperturas.filter(r => Number(r.diferencia) !== 0);
  if(!diffs.length) return `
  <div class="table-card">
    <div class="card-title"><span>Período seleccionado</span>Discrepancias en aperturas</div>
    <div class="empty-state">Sin discrepancias detectadas. ✓</div>
  </div>`;

  const rows = diffs.map(r => {
    const diff = Number(r.diferencia);
    const cls  = diff < 0 ? 'badge-red' : 'badge-warn';
    const txt  = diff < 0 ? `${diff} faltante${Math.abs(diff)!==1?'s':''}` : `+${diff} de más`;
    return `
    <tr>
      <td>${r.fecha||'—'}</td>
      <td>${r.productoNombre||'—'}${r.sabor&&r.sabor!=='—'?' – '+r.sabor:''}</td>
      <td>${r.operador||'—'}</td>
      <td>${r.cantidadEsperada}</td>
      <td>${r.cantidadReal}</td>
      <td><span class="badge ${cls}">${txt}</span></td>
    </tr>`;
  }).join('');

  return `
  <div class="table-card">
    <div class="card-title"><span>Período seleccionado</span>Discrepancias en aperturas</div>
    <table>
      <thead><tr><th>Fecha</th><th>Producto</th><th>Operador</th><th>Esperado</th><th>Real</th><th>Diferencia</th></tr></thead>
      <tbody>${rows}</tbody>
    </table>
  </div>`;
}

// ── INIT ──────────────────────────────────────────────────────
cargarTodo();
// Actualizar cada 5 minutos
setInterval(cargarTodo, 300000);
</script>
